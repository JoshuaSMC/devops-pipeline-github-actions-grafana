name: CI/CD — Build, Push & Deploy to AWS ECS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. latest, sha-abc123)'
        required: false
        default: 'latest'

env:
  AWS_REGION:        us-east-1
  ECR_REPOSITORY:    tasks-api-prod
  ECS_CLUSTER:       tasks-api-prod-cluster
  ECS_SERVICE:       tasks-api-prod-service
  CONTAINER_NAME:    tasks-api
  GHCR_IMAGE:        ghcr.io/joshuasmc/tasks-api

jobs:
  # ── Job 1: Build & push image ────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    outputs:
      image: ${{ steps.push-ecr.outputs.image }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determinar tag de imagen
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Pull imagen desde GHCR y push a ECR
        id: push-ecr
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ steps.tag.outputs.tag }}
        run: |
          docker pull ${{ env.GHCR_IMAGE }}:${IMAGE_TAG}
          ECR_IMAGE="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          ECR_IMAGE_SHA="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}"
          docker tag ${{ env.GHCR_IMAGE }}:${IMAGE_TAG} "${ECR_IMAGE}"
          docker tag ${{ env.GHCR_IMAGE }}:${IMAGE_TAG} "${ECR_IMAGE_SHA}"
          docker push "${ECR_IMAGE}"
          docker push "${ECR_IMAGE_SHA}"
          echo "image=${ECR_IMAGE}" >> "$GITHUB_OUTPUT"

  # ── Job 2: Deploy a ECS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy a ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Descargar task definition actual
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.CONTAINER_NAME }} \
            --query taskDefinition \
            > task-definition.json

      - name: Actualizar imagen en task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build-and-push.outputs.image }}

      - name: Desplegar nueva task definition en ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test post-deploy
        run: |
          echo "Obteniendo DNS del ALB..."
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'tasks-api')].DNSName | [0]" \
            --output text)
          echo "ALB: http://${ALB_DNS}"
          HEALTHY=false
          for i in {1..12}; do
            if curl -sf "http://${ALB_DNS}/actuator/health" | grep -q '"status":"UP"'; then
              echo "Deploy exitoso — API respondiendo"
              HEALTHY=true
              break
            fi
            echo "Intento $i/12 — reintentando en 10s..."
            sleep 10
          done
          if [ "$HEALTHY" = "false" ]; then
            echo "La API no respondió después de 2 minutos post-deploy"
            exit 1
          fi
